<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" preserveAspectRatio="xMidYMid slice" width="1200" height="300">
  <defs>
    <style>
      /* --- BACKGROUND AND FADES --- */
      .bg { fill: #0d1117; }
      .horizon-glow { fill: url(#glowGrad); }

      /* --- HIGH FIDELITY STATIC 3D GRID --- */
      .grid-lines {
        stroke: #45dccc;
        stroke-width: 1.5;
        opacity: 0.3;
      }
      
      /* --- LASER DATA PULSES --- */
      /* We animate stroke-dashoffset to make glowing lines "travel" along the perspective paths */
      @keyframes pulseTravel {
        0% { stroke-dashoffset: 1500; opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { stroke-dashoffset: 0; opacity: 0; }
      }
      
      .data-pulse {
        stroke: #45dccc;
        stroke-width: 3;
        stroke-dasharray: 100 1400; /* Short dash, huge gap */
        opacity: 0;
        filter: drop-shadow(0 0 8px #45dccc) drop-shadow(0 0 20px #45dccc);
        animation: pulseTravel 4s linear infinite;
      }
      
      /* Stagger the laser pulses so they don't all shoot at once */
      .pulse--1 { animation-delay: 0s; }
      .pulse--2 { animation-delay: 1.2s; }
      .pulse--3 { animation-delay: 2.7s; }
      .pulse--4 { animation-delay: 0.5s; }
      .pulse--5 { animation-delay: 3.1s; }
      .pulse--6 { animation-delay: 1.8s; }
      .pulse--7 { animation-delay: 2.3s; }
      .pulse--8 { animation-delay: 0.9s; }

      /* --- TYPING EFFECT --- */
      @keyframes clip1 {
        0%, 5% { width: 0; }
        15%, 25% { width: 400px; } /* Hi, I'm Sabarish */
        33% { width: 0; }
        100% { width: 0; }
      }
      @keyframes clip2 {
        0%, 33% { width: 0; }
        38%, 43% { width: 350px; } /* By 43% it's typed out */
        53%, 58% { width: 350px; } /* Hold */
        66% { width: 0; } /* Backspace */
        100% { width: 0; }
      }
      @keyframes clip3 {
        0%, 66% { width: 0; }
        71%, 76% { width: 850px; } /* my main work... */
        86%, 91% { width: 850px; } /* Hold */
        100% { width: 0; } /* Backspace */
      }
      
      @keyframes blink {
        50% { border-color: transparent; }
      }
      
      .type-container {
        font-family: 'Courier New', Courier, monospace;
        font-size: 32px;
        font-weight: bold;
        fill: #45dccc;
        filter: drop-shadow(0 0 6px #45dccc);
      }

      .caret-1 { animation: clip1 12s infinite, blink 0.7s infinite; stroke: #45dccc; stroke-width: 4px; }
      .caret-2 { animation: clip2 12s infinite, blink 0.7s infinite; stroke: #45dccc; stroke-width: 4px; }
      .caret-3 { animation: clip3 12s infinite, blink 0.7s infinite; stroke: #45dccc; stroke-width: 4px; }

      .text-1 { clip-path: url(#typeClip1); }
      .text-2 { clip-path: url(#typeClip2); }
      .text-3 { clip-path: url(#typeClip3); }
      
      .clip-rect-1 { height: 50px; animation: clip1 12s steps(20, end) infinite; }
      .clip-rect-2 { height: 50px; animation: clip2 12s steps(20, end) infinite; }
      .clip-rect-3 { height: 50px; animation: clip3 12s steps(40, end) infinite; }

    </style>

    <radialGradient id="glowGrad" cx="50%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#45dccc" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#45dccc" stop-opacity="0"/>
    </radialGradient>
    
    <clipPath id="typeClip1">
      <rect class="clip-rect-1" x="430" y="100" />
    </clipPath>
    <clipPath id="typeClip2">
      <rect class="clip-rect-2" x="460" y="100" />
    </clipPath>
    <clipPath id="typeClip3">
      <rect class="clip-rect-3" x="200" y="100" />
    </clipPath>
    
    <!-- We define the straight V-lines once, originating from vanishing point 600,100 -->
    <!-- Line formats: M 600 100 L endpoint_x 300 -->
    <g id="verticalRays">
      <line x1="600" y1="100" x2="-600" y2="300" />
      <line x1="600" y1="100" x2="-350" y2="300" />
      <line x1="600" y1="100" x2="-150" y2="300" />
      <line x1="600" y1="100" x2="30" y2="300" />
      <line x1="600" y1="100" x2="180" y2="300" />
      <line x1="600" y1="100" x2="320" y2="300" />
      <line x1="600" y1="100" x2="460" y2="300" />
      <line x1="600" y1="100" x2="600" y2="300" /> <!-- Center -->
      <line x1="600" y1="100" x2="740" y2="300" />
      <line x1="600" y1="100" x2="880" y2="300" />
      <line x1="600" y1="100" x2="1020" y2="300" />
      <line x1="600" y1="100" x2="1170" y2="300" />
      <line x1="600" y1="100" x2="1350" y2="300" />
      <line x1="600" y1="100" x2="1550" y2="300" />
      <line x1="600" y1="100" x2="1800" y2="300" />
    </g>

    <!-- Horizontal logarithmically spaced depth lines -->
    <g id="horizontalDepths">
      <!-- y = 100 + 10 * 1.3^n -->
      <line x1="0" y1="110" x2="1200" y2="110" />
      <line x1="0" y1="113" x2="1200" y2="113" />
      <line x1="0" y1="117" x2="1200" y2="117" />
      <line x1="0" y1="122" x2="1200" y2="122" />
      <line x1="0" y1="128" x2="1200" y2="128" />
      <line x1="0" y1="137" x2="1200" y2="137" />
      <line x1="0" y1="148" x2="1200" y2="148" />
      <line x1="0" y1="162" x2="1200" y2="162" />
      <line x1="0" y1="181" x2="1200" y2="181" />
      <line x1="0" y1="206" x2="1200" y2="206" />
      <line x1="0" y1="238" x2="1200" y2="238" />
      <line x1="0" y1="279" x2="1200" y2="279" />
      <line x1="0" y1="333" x2="1200" y2="333" />
    </g>
  </defs>

  <!-- Solid Background -->
  <rect class="bg" width="1200" height="300" />
  <rect class="horizon-glow" width="1200" height="300" y="30" />

  <!-- Dims the area below the horizon so lines don't show above it -->
  <!-- We do this by applying the drawing exactly where we want it -->

  <g class="grid-lines" clip-path="url(#horizonCutoff)">
    <!-- Base static 3D Floor -->
    <use href="#verticalRays" />
    <use href="#horizontalDepths" />
  </g>

  <!-- Glow effect overlay -->
  <g class="grid-lines" opacity="0.3" filter="drop-shadow(0 0 4px #45dccc)" clip-path="url(#horizonCutoff)">
    <use href="#horizontalDepths" />
  </g>

  <!-- THE ANIMATED LASER PULSES -->
  <!-- Placed perfectly on top of the vertical perspective paths -->
  <g opacity="0.8">
    <line class="data-pulse pulse--1" x1="600" y1="100" x2="-350" y2="300" />
    <line class="data-pulse pulse--2" x1="600" y1="100" x2="1550" y2="300" />
    <line class="data-pulse pulse--3" x1="600" y1="100" x2="180" y2="300" />
    <line class="data-pulse pulse--4" x1="600" y1="100" x2="1020" y2="300" />
    <line class="data-pulse pulse--5" x1="600" y1="100" x2="460" y2="300" />
    <line class="data-pulse pulse--6" x1="600" y1="100" x2="880" y2="300" />
    <line class="data-pulse pulse--7" x1="600" y1="100" x2="-150" y2="300" />
    <line class="data-pulse pulse--8" x1="600" y1="100" x2="740" y2="300" />
  </g>

  <!-- Horizon line and blackout cover -->
  <rect x="0" y="0" width="1200" height="108" fill="#0d1117" />
  <line x1="0" y1="108" x2="1200" y2="108" stroke="#45dccc" stroke-width="3" filter="drop-shadow(0 0 10px #45dccc)"/>
  <line x1="0" y1="108" x2="1200" y2="108" stroke="#ffffff" stroke-width="1" opacity="0.8"/>

  <!-- Typing Effect Text AND Cursors -->
  <g class="type-container" transform="translate(0, 130)">
    
    <!-- Phrase 1: "Hi, I'm Sabarish" -->
    <text class="text-1" x="430" y="0">Hi, I&apos;m Sabarish</text>
    <line class="caret-1" x1="432" y1="-28" x2="432" y2="6"/>
    
    <!-- Phrase 2: "I'm a Developer" -->
    <text class="text-2" x="460" y="0">I&apos;m a Developer</text>
    <line class="caret-2" x1="462" y1="-28" x2="462" y2="6"/>
    
    <!-- Phrase 3: "my main work creating imaginary to reality" -->
    <text class="text-3" x="200" y="0">my main work creating imaginary to reality</text>
    <line class="caret-3" x1="202" y1="-28" x2="202" y2="6"/>
    
  </g>
  
  <!-- Corner Tech accents -->
  <g stroke="#45dccc" stroke-width="2" fill="none" opacity="0.7">
    <polyline points="0,30 0,0 30,0"/>
    <polyline points="1170,0 1200,0 1200,30"/>
    <polyline points="1200,270 1200,300 1170,300"/>
    <polyline points="30,300 0,300 0,270"/>
  </g>

  <!-- Clip path to keep grid strictly below horizon -->
  <defs>
    <clipPath id="horizonCutoff">
      <rect x="0" y="108" width="1200" height="200" />
    </clipPath>
  </defs>

</svg>
