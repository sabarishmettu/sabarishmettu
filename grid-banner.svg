<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" preserveAspectRatio="xMidYMid slice">
  <defs>
    <style>
      @keyframes gridPulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 1; }
      }
      @keyframes gridScroll {
        0% { transform: translateY(0); }
        100% { transform: translateY(30px); }
      }
      @keyframes horizGlow {
        0%, 100% { stroke-opacity: 0.3; }
        50% { stroke-opacity: 0.8; }
      }
      @keyframes titleGlow {
        0%, 100% { opacity: 0.85; filter: drop-shadow(0 0 8px #45dccc); }
        50% { opacity: 1; filter: drop-shadow(0 0 20px #45dccc) drop-shadow(0 0 40px #45dccc55); }
      }
      @keyframes scanLine {
        0% { transform: translateY(-10px); opacity: 0; }
        10% { opacity: 0.6; }
        90% { opacity: 0.6; }
        100% { transform: translateY(310px); opacity: 0; }
      }
      .grid-v { animation: gridPulse 4s ease-in-out infinite; }
      .grid-v:nth-child(odd) { animation-delay: -2s; }
      .grid-h { animation: horizGlow 5s ease-in-out infinite; }
      .grid-h:nth-child(even) { animation-delay: -2.5s; }
      .title-text { animation: titleGlow 3s ease-in-out infinite; }
      .scan { animation: scanLine 6s linear infinite; }
    </style>
    <linearGradient id="gridFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#45dccc" stop-opacity="0"/>
      <stop offset="40%" stop-color="#45dccc" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#45dccc" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="horizFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#45dccc" stop-opacity="0"/>
      <stop offset="20%" stop-color="#45dccc" stop-opacity="0.5"/>
      <stop offset="80%" stop-color="#45dccc" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#45dccc" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#45dccc" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#45dccc" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="#0d1117"/>
  <rect width="1200" height="300" fill="url(#centerGlow)"/>

  <!-- 3D Perspective Grid -->
  <g transform="translate(600,300) scale(1,-1) rotate(0)" style="transform-origin: 600px 150px;">

    <!-- Vertical lines with perspective convergence -->
    <g class="grid-v">
      <line x1="-600" y1="0" x2="-150" y2="280" stroke="url(#gridFade)" stroke-width="0.5"/>
      <line x1="-500" y1="0" x2="-120" y2="280" stroke="url(#gridFade)" stroke-width="0.5"/>
      <line x1="-400" y1="0" x2="-90" y2="280" stroke="url(#gridFade)" stroke-width="0.6"/>
      <line x1="-300" y1="0" x2="-60" y2="280" stroke="url(#gridFade)" stroke-width="0.6"/>
      <line x1="-200" y1="0" x2="-30" y2="280" stroke="url(#gridFade)" stroke-width="0.7"/>
      <line x1="-100" y1="0" x2="-10" y2="280" stroke="url(#gridFade)" stroke-width="0.8"/>
      <line x1="0" y1="0" x2="0" y2="280" stroke="url(#gridFade)" stroke-width="1"/>
      <line x1="100" y1="0" x2="10" y2="280" stroke="url(#gridFade)" stroke-width="0.8"/>
      <line x1="200" y1="0" x2="30" y2="280" stroke="url(#gridFade)" stroke-width="0.7"/>
      <line x1="300" y1="0" x2="60" y2="280" stroke="url(#gridFade)" stroke-width="0.6"/>
      <line x1="400" y1="0" x2="90" y2="280" stroke="url(#gridFade)" stroke-width="0.6"/>
      <line x1="500" y1="0" x2="120" y2="280" stroke="url(#gridFade)" stroke-width="0.5"/>
      <line x1="600" y1="0" x2="150" y2="280" stroke="url(#gridFade)" stroke-width="0.5"/>
    </g>

    <!-- Horizontal lines -->
    <line class="grid-h" x1="-600" y1="20" x2="600" y2="20" stroke="url(#horizFade)" stroke-width="0.4"/>
    <line class="grid-h" x1="-580" y1="50" x2="580" y2="50" stroke="url(#horizFade)" stroke-width="0.5"/>
    <line class="grid-h" x1="-540" y1="80" x2="540" y2="80" stroke="url(#horizFade)" stroke-width="0.5"/>
    <line class="grid-h" x1="-480" y1="110" x2="480" y2="110" stroke="url(#horizFade)" stroke-width="0.6"/>
    <line class="grid-h" x1="-400" y1="140" x2="400" y2="140" stroke="url(#horizFade)" stroke-width="0.6"/>
    <line class="grid-h" x1="-320" y1="170" x2="320" y2="170" stroke="url(#horizFade)" stroke-width="0.7"/>
    <line class="grid-h" x1="-240" y1="200" x2="240" y2="200" stroke="url(#horizFade)" stroke-width="0.7"/>
    <line class="grid-h" x1="-160" y1="230" x2="160" y2="230" stroke="url(#horizFade)" stroke-width="0.8"/>
    <line class="grid-h" x1="-80" y1="260" x2="80" y2="260" stroke="url(#horizFade)" stroke-width="0.9"/>

  </g>

  <!-- Scan line effect -->
  <rect class="scan" x="0" y="-10" width="1200" height="2" fill="#45dccc" opacity="0.4"/>

  <!-- Corner accents -->
  <g stroke="#45dccc" stroke-width="1.5" fill="none" opacity="0.6">
    <polyline points="0,30 0,0 30,0"/>
    <polyline points="1170,0 1200,0 1200,30"/>
    <polyline points="1200,270 1200,300 1170,300"/>
    <polyline points="30,300 0,300 0,270"/>
  </g>

  <!-- Decorative dots -->
  <circle cx="40" cy="10" r="2" fill="#45dccc" opacity="0.5"/>
  <circle cx="55" cy="10" r="2" fill="#45dccc" opacity="0.3"/>
  <circle cx="70" cy="10" r="2" fill="#45dccc" opacity="0.5"/>
  <circle cx="1130" cy="290" r="2" fill="#45dccc" opacity="0.5"/>
  <circle cx="1145" cy="290" r="2" fill="#45dccc" opacity="0.3"/>
  <circle cx="1160" cy="290" r="2" fill="#45dccc" opacity="0.5"/>

  <!-- Title -->
  <text class="title-text" x="600" y="135" text-anchor="middle" font-family="'Courier New', monospace" font-size="34" font-weight="bold" fill="#45dccc" letter-spacing="6">
    Sabarish Github profile DEVELOPER
  </text>
  <text x="600" y="170" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" fill="#45dccc" opacity="0.6" letter-spacing="3">
    main work creating imaginary to reality
  </text>
</svg>
